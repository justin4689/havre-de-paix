<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#166534"/>
      <stop offset="100%" style="stop-color:#14532d"/>
    </linearGradient>
    <linearGradient id="room2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
  </defs>
  <!-- Fond nature -->
  <rect width="1200" height="800" fill="#dcfce7"/>
  <!-- Ciel -->
  <rect x="0" y="0" width="1200" height="360" fill="#bfdbfe"/>
  <!-- Jardin tropicale -->
  <rect x="0" y="360" width="1200" height="440" fill="url(#ground)"/>
  <!-- Herbe/végétation -->
  <ellipse cx="100" cy="380" rx="120" ry="60" fill="#16a34a" opacity="0.8"/>
  <ellipse cx="300" cy="370" rx="100" ry="50" fill="#15803d" opacity="0.9"/>
  <ellipse cx="500" cy="375" rx="130" ry="55" fill="#16a34a" opacity="0.7"/>
  <ellipse cx="700" cy="365" rx="110" ry="50" fill="#15803d" opacity="0.8"/>
  <ellipse cx="950" cy="370" rx="130" ry="60" fill="#16a34a" opacity="0.9"/>
  <ellipse cx="1150" cy="380" rx="100" ry="55" fill="#15803d" opacity="0.8"/>
  <!-- Arbres tropicaux -->
  <rect x="90" y="150" width="18" height="250" fill="#92400e"/>
  <ellipse cx="99" cy="130" rx="80" ry="55" fill="#15803d"/>
  <ellipse cx="70" cy="105" rx="60" ry="40" fill="#16a34a" opacity="0.9"/>
  <ellipse cx="130" cy="100" rx="65" ry="42" fill="#22c55e" opacity="0.8"/>
  <rect x="280" y="100" width="16" height="280" fill="#92400e"/>
  <ellipse cx="288" cy="80" rx="75" ry="52" fill="#15803d"/>
  <ellipse cx="260" cy="58" rx="60" ry="38" fill="#22c55e" opacity="0.9"/>
  <ellipse cx="318" cy="55" rx="62" ry="40" fill="#16a34a" opacity="0.8"/>
  <rect x="1050" y="120" width="18" height="280" fill="#92400e"/>
  <ellipse cx="1059" cy="100" rx="80" ry="55" fill="#15803d"/>
  <ellipse cx="1030" cy="78" rx="65" ry="40" fill="#22c55e" opacity="0.8"/>
  <ellipse cx="1090" cy="75" rx="68" ry="42" fill="#16a34a" opacity="0.9"/>
  <!-- Bougainvillée -->
  <ellipse cx="850" cy="200" rx="90" ry="65" fill="#ec4899" opacity="0.7"/>
  <ellipse cx="880" cy="175" rx="70" ry="50" fill="#f472b6" opacity="0.8"/>
  <rect x="870" y="200" width="12" height="200" fill="#78350f"/>
  <!-- Allée pierre -->
  <ellipse cx="600" cy="500" rx="120" ry="30" fill="#a3a3a3" opacity="0.4"/>
  <rect x="560" y="500" width="80" height="240" fill="#a3a3a3" opacity="0.3"/>
  <!-- Chambre visible à travers les arbres -->
  <rect x="430" y="240" width="340" height="180" rx="8" fill="url(#room2)"/>
  <rect x="445" y="255" width="80" height="100" rx="4" fill="#bae6fd" opacity="0.7"/>
  <rect x="545" y="255" width="80" height="100" rx="4" fill="#bae6fd" opacity="0.7"/>
  <rect x="645" y="255" width="80" height="100" rx="4" fill="#bae6fd" opacity="0.7"/>
  <!-- Toit -->
  <polygon points="410,245 780,245 760,195 430,195" fill="#7f1d1d"/>
  <!-- Terrasse -->
  <rect x="430" y="415" width="340" height="15" rx="4" fill="#d97706"/>
  <rect x="440" y="430" width="60" height="80" fill="#d97706" opacity="0.5"/>
  <rect x="660" y="430" width="60" height="80" fill="#d97706" opacity="0.5"/>
  <!-- Plantes terrasse -->
  <ellipse cx="440" cy="435" rx="30" ry="20" fill="#22c55e"/>
  <ellipse cx="770" cy="435" rx="30" ry="20" fill="#16a34a"/>
  <!-- Texte -->
  <rect x="0" y="700" width="1200" height="100" fill="rgba(0,0,0,0.6)"/>
  <text x="600" y="745" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="white">Chambre Jardin</text>
  <text x="600" y="783" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#bbf7d0">Havre de Paix · Assinie · Vue Jardins Tropicaux</text>
</svg>
