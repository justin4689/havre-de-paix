name: cascades-prod

# Production : image immuable (code + vendor + assets compilés dans l'image),
# PHP-FPM derrière Nginx, MySQL non exposé, queue et scheduler supervisés.
# Le .env du serveur est la source de vérité (cf. .env.production.example).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --force

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: app
    restart: unless-stopped
    env_file: .env
    volumes:
      # Seules les données vivantes sortent de l'image
      - storage_uploads:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: web
    restart: unless-stopped
    ports:
      # TLS géré en amont (Cloudflare / reverse proxy du VPS)
      - "${HTTP_PORT:-80}:80"
    volumes:
      - storage_uploads:/var/www/html/public/storage:ro
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: app
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3", "--max-time=3600"]
    env_file: .env
    volumes:
      - storage_uploads:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: app
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file: .env
    volumes:
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    # Aucun port publié : accessible uniquement depuis le réseau interne
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cascades}
      MYSQL_USER: ${DB_USERNAME:-cascades}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis dans le .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD requis dans le .env}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      # 127.0.0.1 force le TCP : évite le faux positif du serveur temporaire
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_prod_data:
  storage_uploads:
  storage_logs:
